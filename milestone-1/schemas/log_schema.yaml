version: 1.0
description: Schema defining structure of high-throughput system logs

log_schema:
  fields:

    - name: timestamp
      type: datetime
      format: "%Y-%m-%dT%H:%M:%S"
      description: Time at which the log event occurred

    - name: log_level
      type: string
      allowed_values: [DEBUG, INFO, WARNING, ERROR, CRITICAL]
      description: Severity level of the log

    - name: service_name
      type: string
      description: Name of microservice or component generating the log

    - name: host
      type: string
      description: Machine or node producing the log

    - name: event_type
      type: string
      description: Category of event (REQUEST, RESPONSE, DB_CALL, etc.)

    - name: message
      type: string
      description: Human-readable log message

    - name: latency_ms
      type: integer
      required: false
      description: Optional latency measurement for performance tracking

    - name: status_code
      type: integer
      required: false
      description: Optional status code for requests/events
